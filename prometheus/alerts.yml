groups:
- name: trading_critical
  interval: 30s
  rules:
  - alert: TradingSystemDown
    # 5-минутное окно: redeploy на Railway занимает 1-2 минуты, hook
    # перестартует Prometheus scrape до того как Uvicorn снова отвечает.
    # Для реального падения бота 5 мин — всё ещё разумное время реакции.
    expr: up{job="crypto-ai-bot"} == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Trading system is DOWN! 🚨"
      description: "Crypto bot не отвечает больше 5 минут. Требуется немедленное вмешательство!"
  
  - alert: HighErrorRate
    expr: rate(http_requests_total{job="crypto-ai-bot",code=~"5.."}[5m]) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Критический уровень ошибок"
      description: "Более 5% запросов завершаются ошибкой 5xx за последние 5 минут"

- name: trading_warnings
  interval: 30s
  rules:
  - alert: HighMemoryUsage
    expr: (process_resident_memory_bytes{job="crypto-ai-bot"} / 1024 / 1024) > 512
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Высокое использование памяти"
      description: "Использование памяти превышает 512MB (текущее: {{ $value | humanize }}MB)"
  
  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(http_request_latency_seconds_bucket{job="crypto-ai-bot"}[5m])) > 2
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Высокая задержка ответов"
      description: "95% запросов выполняются дольше 2 секунд"
  
  - alert: LowDiskSpace
    expr: (node_filesystem_avail_bytes{job="crypto-ai-bot"} / node_filesystem_size_bytes{job="crypto-ai-bot"}) < 0.1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Мало свободного места на диске"
      description: "Осталось менее 10% свободного места"

- name: trading_performance
  interval: 60s
  rules:
  # `NoRecentRequests` removed: the bot is a headless worker — it never
  # serves HTTP traffic from humans, so this alert was permanently firing
  # and driving the hourly Telegram spam.
  # `TelegramWebhookErrors` removed: the bot does not expose /telegram
  # webhook endpoint, the check was meaningless.
  - alert: NoEvaluationCycles
    expr: rate(evaluation_cycles_total{job="crypto-ai-bot"}[15m]) == 0
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Нет циклов оценки"
      description: "evaluation_cycles_total не растёт 10 минут — orchestrator остановился"

  - alert: ServiceRestarted
    expr: changes(process_start_time_seconds{job="crypto-ai-bot"}[5m]) > 0
    labels:
      severity: info
    annotations:
      summary: "Сервис был перезапущен"
      description: "Обнаружен перезапуск crypto-ai-bot"

- name: trading_signals
  interval: 60s
  rules:
  - alert: BarAlignmentDesync
    expr: increase(log_warnings_total{event="bar_alignment_desync"}[10m]) > 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "AI/tech desync detected"
      description: "tech_last_bar_ts ≠ ai_last_bar_ts — closed-bar contract regression"

  - alert: AIGateAlwaysBlocking
    expr: |
      sum by (zone) (rate(ai_gate_blocked_total[30m]))
        / sum by (zone) (rate(evaluation_cycles_total[30m])) > 0.95
    for: 30m
    labels:
      severity: warning
    annotations:
      summary: "AI блокирует >95% сигналов в зоне {{ $labels.zone }}"
      description: "Зона {{ $labels.zone }} упирается в AI veto — проверить threshold или регресс модели"

  - alert: ExitsDominatedByTimeout
    expr: |
      sum(increase(exit_reason_by_zone_total{reason="timeout"}[6h]))
        / sum(increase(exit_reason_by_zone_total[6h])) > 0.70
    for: 1h
    labels:
      severity: warning
    annotations:
      summary: "Больше 70% позиций закрываются по timeout"
      description: "Профиль выхода не ловит ни TP ни SL — сигнал что SL/TP/trailing требуют перекалибровки"