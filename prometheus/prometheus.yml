global:
  scrape_interval: 30s
  evaluation_interval: 30s

# Forward firing alerts to Alertmanager (Railway internal DNS).
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'crypto-bot-monitoring-263377b1.railway.internal:9093'

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'crypto-ai-bot'
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['crypto-ai-bot.railway.internal:8000']
        labels:
          app: 'crypto-ai-bot'
          environment: 'production'