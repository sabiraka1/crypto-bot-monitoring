global:
  resolve_timeout: 5m

route:
  receiver: telegram-alerts
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  # 6h repeat: hourly was too aggressive for a headless worker where a few
  # warning-level alerts can stay active indefinitely (e.g. memory headroom).
  repeat_interval: 6h

receivers:
  - name: telegram-alerts
    telegram_configs:
      # entrypoint.sh substitutes these placeholders at container start
      # from TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID Railway env vars.
      - bot_token: 'TELEGRAM_BOT_TOKEN_PLACEHOLDER'
        chat_id: TELEGRAM_CHAT_ID_PLACEHOLDER
        send_resolved: true
        parse_mode: 'Markdown'
